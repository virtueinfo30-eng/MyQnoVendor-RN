pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex ->
    // Directly invoke node with the CLI path to avoid npx/PATH issues
    def cliPath = new File(settings.layout.rootDirectory.asFile, "../node_modules/@react-native-community/cli/build/bin.js").absolutePath
    ex.autolinkLibrariesFromCommand(
        ["/usr/local/bin/node", cliPath, "config"]
    )
}
rootProject.name = 'MyQnoVendor_RN'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
include ':react-native-vector-icons'
project(':react-native-vector-icons').projectDir = new File(rootProject.projectDir, '../node_modules/react-native-vector-icons/android')
